name: Python CI

on:
  push:
    branches: [main]
    paths:
      - "DataGenerator/**"
      - ".github/workflows/python-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "DataGenerator/**"
      - ".github/workflows/python-ci.yml"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ./DataGenerator
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        working-directory: ./DataGenerator
        run: flake8 . --max-line-length=120 --exclude=.dataGenerator

      